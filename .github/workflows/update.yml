name: LeetCode Tracker

on:
  schedule:
    - cron: "0 18 * * *"   # runs daily (11:30 PM IST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker script
        run: python tracker.py
        env:
          LEETCODE_USERNAME: ${{ secrets.LEETCODE_USERNAME }}

      # ✅ ensures commit always happens (even if no new submissions)
      - name: Update last run timestamp
        run: echo "Last run: $(date)" > last_run.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "daily update + leetcode sync" || echo "no changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
