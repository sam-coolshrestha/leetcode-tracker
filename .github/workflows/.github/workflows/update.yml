name: LeetCode Tracker

on:
  schedule:
    - cron: "0 18 * * *"   # runs daily (adjust time)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker
        run: python tracker.py

      - name: Commit changes
        run: |
          git config user.name "leetcode-bot"
          git config user.email "bot@example.com"
          git add .
          git commit -m "update leetcode progress" || echo "no changes"
          git push
